<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>QR-anchored OMR — Images Only (OpenCV.js)</title>
<style>
  :root{--bg:#0b0e14;--card:#131721;--text:#e6edf3;--muted:#9aa4b2}
  *{box-sizing:border-box}
  body{margin:0;font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text)}
  header{padding:12px 18px;border-bottom:1px solid #222733;background:#0f1320;position:sticky;top:0;z-index:10}
  h1{font-size:18px;margin:0}
  main{padding:12px;display:grid;gap:12px}
  .tabs{display:flex;gap:8px}
  .tabbtn{background:#11182a;color:#cfe6ff;border:1px solid #28324a;padding:8px 10px;border-radius:8px;cursor:pointer}
  .tabbtn.active{background:linear-gradient(180deg,#3ee8d1,#2ec4b6);color:#061018;border:0}
  .card{background:var(--card);border:1px solid #222733;border-radius:12px}
  .pad{padding:12px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  label{display:block;font-size:12px;color:var(--muted);margin:6px 0}
  input,select,textarea,button{font:inherit}
  input[type="file"],input[type="number"],input[type="text"],select,textarea{width:100%;background:#0f1320;color:var(--text);border:1px solid #2a3142;border-radius:8px;padding:8px}
  textarea{min-height:120px;font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, monospace}
  button{background:linear-gradient(180deg,#3ee8d1,#2ec4b6);color:#061018;border:0;border-radius:10px;padding:8px 10px;cursor:pointer}
  .mutebtn{background:#1a2235;color:#d9e1ee;border:1px solid #2a3142}
  .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .pill{background:#0f1320;border:1px solid #2a3142;border-radius:999px;padding:6px 10px;font-size:12px;color:var(--muted)}
  .canvaswrap{position:relative;display:block}
  canvas{display:block;max-width:100%}
  .tag{position:absolute;left:8px;top:8px;background:#112236;color:#9bd6ff;padding:4px 8px;border-radius:999px;font-size:12px;border:1px solid #1f3d62}
  .small{font-size:12px;color:var(--muted)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
  .card-list{display:block;max-height:220px;overflow:auto;padding:6px}
  #bubbleManager{display:none;position:fixed;left:50%;top:10%;transform:translateX(-50%);background:#131826;border:1px solid #2a3142;padding:12px;border-radius:10px;z-index:9999;width:520px}
  #bubbleManager table{width:100%;border-collapse:collapse}
  #bubbleManager td, th{padding:6px;border-bottom:1px solid #222}
</style>
</head>
<body>
<header><h1>QR-anchored OMR — Images Only</h1></header>
<main>
  <div class="tabs">
    <button class="tabbtn active" data-tab="builder">1) Template Builder</button>
    <button class="tabbtn" data-tab="runner">2) OMR Runner</button>
  </div>

  <!-- Builder -->
  <section id="builder" class="card pad">
    <div class="row">
      <div>
        <label>Upload template image (PNG / JPG)</label>
        <input id="tplFile" type="file" accept="image/*" />
      </div>
      <div>
        <label>Template DPI / Page (for mm↔px)</label>
        <input id="tplDPI" type="number" value="300" min="72" />
      </div>
    </div>

    <div class="tools" style="margin-top:8px">
      <button id="btnDetectQR">Detect 4 Corner QR (LT/RT/LB/RB)</button>
      <button id="btnDetectCircles" class="mutebtn">Auto-detect Bubbles</button>
      <button id="btnManageBubbles" class="mutebtn">Manage Bubbles</button>
      <span class="pill">QR text: LT, RT, LB, RB (exact)</span>
    </div>

    <div style="margin-top:8px" class="grid">
      <div class="card pad">
        <div class="tag">Template</div>
        <div class="canvaswrap">
          <canvas id="tplCanvas"></canvas>
          <!-- faint warped preview (non interactive) -->
          <canvas id="templateOverlay" style="position:absolute;left:0;top:0;pointer-events:none;opacity:.18"></canvas>
          <!-- interactive overlay for bubbles and drawing -->
          <canvas id="tplOverlay" style="position:absolute;left:0;top:0;pointer-events:auto"></canvas>
        </div>
        <div class="small" style="margin-top:6px">Draw bubbles with the overlay (drag), then click "Add bubble".</div>
      </div>

      <div class="card pad">
        <label>Generated Template JSON</label>
        <textarea id="tplOut" placeholder="Build JSON after placing bubbles…"></textarea>
        <div style="margin-top:8px" class="tools">
          <button id="btnBuildJSON">Build JSON</button>
          <button id="btnDownloadJSON" class="mutebtn" disabled>Download JSON</button>
        </div>
        <div style="margin-top:10px">
          <label>Quick controls</label>
          <div class="tools">
            <input id="nextId" type="text" value="1.1" style="width:120px" />
            <button id="btnAddBubble" class="mutebtn">Add bubble</button>
            <button id="btnUndo" class="mutebtn">Undo</button>
            <button id="btnClear" class="mutebtn">Clear</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Runner -->
  <section id="runner" class="card pad" style="display:none">
    <div class="row">
      <div>
        <label>Upload marked sheets (images, multi-select)</label>
        <input id="runFiles" type="file" multiple accept="image/*" />
      </div>
      <div>
        <label>Template JSON (paste from builder)</label>
        <textarea id="runTpl" placeholder="Paste template JSON here"></textarea>
      </div>
    </div>

    <div style="margin-top:8px" class="tools">
      <!-- New flow -->
      <button id="btnLoadPages">Load Pages</button>
      <button id="btnRunOMR" disabled>Run OMR for All Pages</button>
      <button id="btnDownloadCSV" class="mutebtn" disabled>Download CSV</button>

      <!-- Original flow -->
      <button id="btnRun" disabled>Run OMR (original)</button>
      <button id="btnCSV" class="mutebtn" disabled>Download detailed CSV</button>

      <span class="pill">Filled if fill-ratio ≥ <span id="fillCutLabel">0.55</span></span>
    </div>

    <div id="canvasContainer" style="display:grid;gap:10px;margin-top:10px"></div>
    <div id="runResults" class="grid" style="margin-top:10px"></div>
  </section>
</main>

<!-- Bubble Manager Modal -->
<div id="bubbleManager">
  <h3>Manage Bubbles</h3>
  <table id="bubbleTable"><thead><tr><th>Label</th><th>X</th><th>Y</th><th>R</th></tr></thead><tbody></tbody></table>
  <div style="margin-top:8px">
    <label>New Label</label>
    <input id="newBubbleLabel" type="text" />
  </div>
  <div style="margin-top:8px;display:flex;gap:8px">
    <button id="btnUpdateBubble">Update Label</button>
    <button id="btnDeleteBubble" style="background:#e55;color:#fff">Delete</button>
    <button id="btnCloseManager" style="margin-left:auto">Close</button>
  </div>
</div>

<!-- OpenCV.js -->
<script async src="opencv.js" onload="cvReady()" onerror="alert('OpenCV.js failed to load. Try serving via HTTP or ensure internet access for WASM.')"></script>

<script>
/* Helpers & UI */
const $ = s => document.querySelector(s);
function mm2px(mm,dpi){ return Math.round(mm * dpi / 25.4); }
function px2mm(px,dpi){ return +(px * 25.4 / dpi).toFixed(3); }
function ensureOdd(n){ return (n%2)?n:n+1; }

document.querySelectorAll('.tabbtn').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.tabbtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const tab = b.dataset.tab;
    $('#builder').style.display = tab==='builder' ? '' : 'none';
    $('#runner').style.display = tab==='runner' ? '' : 'none';
  })
});

/* OpenCV ready */
let cvIsReady = false;
function cvReady(){ cvIsReady = true; console.log('OpenCV ready'); }

/* Template builder state */
const tplFile = $('#tplFile');
const tplCanvas = $('#tplCanvas');
const tplOverlay = $('#tplOverlay');
const templateOverlay = $('#templateOverlay');
const tplOut = $('#tplOut');
const tplDPI = $('#tplDPI');
const btnDetectQR = $('#btnDetectQR');
const btnDetectCircles = $('#btnDetectCircles');
const btnManageBubbles = $('#btnManageBubbles');
const btnBuildJSON = $('#btnBuildJSON');
const btnDownloadJSON = $('#btnDownloadJSON');
const btnAddBubble = $('#btnAddBubble');
const btnUndo = $('#btnUndo');
const btnClear = $('#btnClear');
const nextId = $('#nextId');

let tplImg = null; // canvas with template image
let qrCorners = null; // detected QR centers
let bubbles = []; // {id,x,y,r} in pixels (overlay coords)
let drawState = null;

/* Load template image */
tplFile.addEventListener('change', async ()=>{
  const f = tplFile.files && tplFile.files[0];
  if (!f) return;
  tplOut.value = ''; bubbles = []; qrCorners = null;
  tplImg = await fileToCanvas(f);
  // size canvases equally
  [tplCanvas, templateOverlay, tplOverlay].forEach(c => { c.width = tplImg.width; c.height = tplImg.height; });
  tplCanvas.getContext('2d').drawImage(tplImg,0,0);
  templateOverlay.getContext('2d').clearRect(0,0,templateOverlay.width,templateOverlay.height);
  tplOverlay.getContext('2d').clearRect(0,0,tplOverlay.width,tplOverlay.height);
});

/* QR detect -> auto detect bubbles immediately */
btnDetectQR.addEventListener('click', async ()=>{
  if (!cvIsReady) return alert('OpenCV not ready.');
  if (!tplImg) return alert('Upload a template image first.');
  try{
    qrCorners = detectFourQRByQuadrants(tplImg, true);
    // faint warped underlay
    drawTemplateOverlay(tplImg, {LT:qrCorners.tl,RT:qrCorners.tr,LB:qrCorners.lb,RB:qrCorners.rb});
    // auto detect circles now
    detectCirclesInQRRegion(true);
    drawOverlayBuilder();
    alert('QR detected and bubbles auto-detected.');
  }catch(e){
    alert('QR detection failed: '+e.message);
  }
});

/* Drawing overlay (bubbles + labels + QR boxes) */
function drawOverlayBuilder(){
  const ctx = tplOverlay.getContext('2d');
  ctx.clearRect(0,0,tplOverlay.width,tplOverlay.height);
  // QR boxes
  if (qrCorners){
    ctx.strokeStyle = '#7ef1c0'; ctx.lineWidth = 3; ctx.fillStyle = '#7ef1c0';
    ['tl','tr','lb','rb'].forEach(k=>{
      const q = qrCorners[k]; if(!q) return;
      ctx.strokeRect(q.x - q.size/2, q.y - q.size/2, q.size, q.size);
      ctx.font = '14px monospace'; ctx.fillText(k.toUpperCase(), q.x + 6, q.y - 6);
    });
  }
  // bubbles (outline + label)
  bubbles.forEach(b=>{
    const ctx2 = tplOverlay.getContext('2d');
    ctx2.save();
    ctx2.lineWidth = 2; ctx2.strokeStyle = '#5eead4';
    ctx2.beginPath(); ctx2.arc(b.x,b.y,b.r,0,Math.PI*2); ctx2.stroke();
    ctx2.fillStyle = '#e6edf3'; ctx2.font = '14px ui-monospace,monospace';
    ctx2.fillText(b.id, b.x + b.r + 6, b.y - 4);
    ctx2.restore();
  });
}

/* Manual draw on overlay to add bubble */
tplOverlay.addEventListener('mousedown', e=>{
  if(!tplImg) return;
  const rect = tplOverlay.getBoundingClientRect();
  const x0 = (e.clientX - rect.left) * (tplOverlay.width / rect.width);
  const y0 = (e.clientY - rect.top) * (tplOverlay.height / rect.height);
  drawState = {x0,y0,x1:x0,y1:y0};
});
tplOverlay.addEventListener('mousemove', e=>{
  if(!drawState) return;
  const rect = tplOverlay.getBoundingClientRect();
  drawState.x1 = (e.clientX - rect.left) * (tplOverlay.width / rect.width);
  drawState.y1 = (e.clientY - rect.top) * (tplOverlay.height / rect.height);
  drawOverlayBuilder();
  const ctx = tplOverlay.getContext('2d');
  ctx.save(); ctx.setLineDash([6,4]); ctx.strokeStyle='#ffd166';
  const rx = (drawState.x1 - drawState.x0)/2, ry = (drawState.y1 - drawState.y0)/2;
  const cx = drawState.x0 + rx, cy = drawState.y0 + ry, r = Math.max(2, Math.min(Math.abs(rx),Math.abs(ry)));
  ctx.beginPath(); ctx.ellipse(cx,cy,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2); ctx.stroke();
  ctx.restore();
});
tplOverlay.addEventListener('mouseup', ()=>{
  if(!drawState) return;
  const {x0,y0,x1,y1} = drawState; drawState = null;
  if (Math.hypot(x1-x0,y1-y0) < 4) return;
  const rx = (x1-x0)/2, ry = (y1-y0)/2;
  const cx = x0 + rx, cy = y0 + ry, r = Math.max(2, Math.min(Math.abs(rx),Math.abs(ry)));
  tplOverlay._preview = {cx,cy,r};
  drawOverlayBuilder();
  const ctx = tplOverlay.getContext('2d');
  ctx.save(); ctx.setLineDash([6,4]); ctx.strokeStyle='#ffd166'; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke(); ctx.restore();
});

/* manual add */
$('#btnAddBubble').addEventListener('click', ()=>{
  if(!tplOverlay._preview) return alert('Draw a bubble first on overlay.');
  const id = (nextId.value||'').trim(); if(!id) return alert('Enter an ID like 1.1');
  const {cx,cy,r} = tplOverlay._preview;
  bubbles.push({id,x:cx,y:cy,r});
  tplOverlay._preview = null; drawOverlayBuilder();
});

/* undo/clear */
btnUndo.addEventListener('click', ()=>{ bubbles.pop(); drawOverlayBuilder(); });
btnClear.addEventListener('click', ()=>{ bubbles=[]; drawOverlayBuilder(); });

/* Build JSON / Download */
btnBuildJSON.addEventListener('click', ()=>{
  if(!tplImg) return alert('Upload template first.');
  if(!qrCorners) return alert('Detect QR first.');
  if(!bubbles.length) return alert('Add bubbles first.');
  const dpi = Number(tplDPI.value) || 300;
  const json = {
    dpi,
    page:{ width_mm:210, height_mm:297 },
    align_marks:{
      tl:{x_mm:px2mm(qrCorners.tl.x,dpi), y_mm:px2mm(qrCorners.tl.y,dpi), size_mm:px2mm(qrCorners.tl.size,dpi)},
      tr:{x_mm:px2mm(qrCorners.tr.x,dpi), y_mm:px2mm(qrCorners.tr.y,dpi), size_mm:px2mm(qrCorners.tr.size,dpi)},
      bl:{x_mm:px2mm(qrCorners.lb.x,dpi), y_mm:px2mm(qrCorners.lb.y,dpi), size_mm:px2mm(qrCorners.lb.size,dpi)},
      br:{x_mm:px2mm(qrCorners.rb.x,dpi), y_mm:px2mm(qrCorners.rb.y,dpi), size_mm:px2mm(qrCorners.rb.size,dpi)}
    },
    threshold:{method:'adaptive_mean', blockSize:31, C:10},
    fill_ratio:0.55,
    bubbles: bubbles.map(b=>({id:b.id, x_mm: px2mm(b.x,dpi), y_mm: px2mm(b.y,dpi), r_mm: px2mm(b.r,dpi)}))
  };
  tplOut.value = JSON.stringify(json,null,2);
  btnDownloadJSON.disabled = false;
});
btnDownloadJSON.addEventListener('click', ()=>{
  const blob = new Blob([tplOut.value||''],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='omr_template.json'; a.click(); URL.revokeObjectURL(url);
});

/* Bubble auto-detection inside QR region (warped) */
btnDetectCircles.addEventListener('click', ()=> detectCirclesInQRRegion(false));
function detectCirclesInQRRegion(silent=false){
  if(!cvIsReady) return alert('OpenCV not ready.');
  if(!tplImg) return alert('Upload template first.');
  if(!qrCorners) return alert('Detect QR first.');
  const src = cv.imread(tplImg);
  const gray = new cv.Mat(); cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  const srcPts = cv.matFromArray(4,1,cv.CV_32FC2,[
    qrCorners.tl.x,qrCorners.tl.y,
    qrCorners.tr.x,qrCorners.tr.y,
    qrCorners.lb.x,qrCorners.lb.y,
    qrCorners.rb.x,qrCorners.rb.y
  ]);
  const w = Math.max(Math.hypot(qrCorners.tr.x-qrCorners.tl.x,qrCorners.tr.y-qrCorners.tl.y),
                     Math.hypot(qrCorners.rb.x-qrCorners.lb.x,qrCorners.rb.y-qrCorners.lb.y));
  const h = Math.max(Math.hypot(qrCorners.lb.x-qrCorners.tl.x,qrCorners.lb.y-qrCorners.tl.y),
                     Math.hypot(qrCorners.rb.x-qrCorners.tr.x,qrCorners.rb.y-qrCorners.tr.y));
  const dstPts = cv.matFromArray(4,1,cv.CV_32FC2,[0,0,w,0,0,h,w,h]);
  const M = cv.getPerspectiveTransform(srcPts,dstPts);
  const warped = new cv.Mat(); cv.warpPerspective(gray, warped, M, new cv.Size(Math.round(w),Math.round(h)));
  const circles = new cv.Mat();
  // tune params for your scans
  cv.HoughCircles(warped, circles, cv.HOUGH_GRADIENT, 1, 20, 120, 30, 4, 60);
  const Minv = cv.getPerspectiveTransform(dstPts, srcPts);
  let added = 0;
  for(let i=0;i<circles.cols;i++){
    const x = circles.data32F[i*3], y = circles.data32F[i*3+1], r = circles.data32F[i*3+2];
    const p = cv.matFromArray(1,1,cv.CV_32FC2,[x,y]);
    const q = new cv.Mat();
    cv.perspectiveTransform(p,q,Minv);
    const cx = q.data32F[0], cy = q.data32F[1];
    // avoid near duplicates
    const dup = bubbles.some(b=>Math.hypot(b.x-cx,b.y-cy) < Math.max(b.r,r)*0.6);
    if(!dup){
      const id = (nextId.value||'auto') + '.' + (bubbles.length+1);
      bubbles.push({id,x:cx,y:cy,r});
      added++;
    }
    p.delete(); q.delete();
  }
  src.delete(); gray.delete(); warped.delete(); circles.delete();
  srcPts.delete(); dstPts.delete(); M.delete(); Minv.delete();
  drawOverlayBuilder();
  if(!silent) alert('Auto-detect added: '+added);
}

/* Bubble Manager UI */
let selectedBubbleIndex = null;
btnManageBubbles.addEventListener('click', openBubbleManager);
$('#btnCloseManager').addEventListener('click', ()=>{ $('#bubbleManager').style.display='none'; selectedBubbleIndex=null;});
$('#btnUpdateBubble').addEventListener('click', ()=>{
  if(selectedBubbleIndex===null) return alert('Select bubble');
  const v = $('#newBubbleLabel').value.trim(); if(!v) return alert('Enter label');
  bubbles[selectedBubbleIndex].id = v; openBubbleManager(); drawOverlayBuilder();
});
$('#btnDeleteBubble').addEventListener('click', ()=>{
  if(selectedBubbleIndex===null) return alert('Select bubble');
  bubbles.splice(selectedBubbleIndex,1); selectedBubbleIndex=null; openBubbleManager(); drawOverlayBuilder();
});
function openBubbleManager(){
  const tbody = $('#bubbleTable tbody'); tbody.innerHTML='';
  bubbles.forEach((b,i)=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${b.id}</td><td>${Math.round(b.x)}</td><td>${Math.round(b.y)}</td><td>${Math.round(b.r)}</td>`;
    tr.addEventListener('click', ()=>{
      tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('selected'));
      tr.classList.add('selected'); selectedBubbleIndex = i; $('#newBubbleLabel').value = b.id;
    });
    tbody.appendChild(tr);
  });
  $('#bubbleManager').style.display = 'block';
}

/* ===== Runner flows (images only) ===== */
const runFiles = $('#runFiles');
const runTpl = $('#runTpl');
const btnLoadPages = $('#btnLoadPages');
const btnRunOMR = $('#btnRunOMR');
const btnDownloadCSV = $('#btnDownloadCSV');
const btnRun = $('#btnRun');
const btnCSV = $('#btnCSV');
const canvasContainer = $('#canvasContainer');
const runResults = $('#runResults');

let loadedCanvases = []; // {name,pageNum,canvas}
let omrResults = []; // {name,pageNum,items or error}

runFiles.addEventListener('change', async ()=>{
  // clear any previous
  loadedCanvases = []; canvasContainer.innerHTML=''; runResults.innerHTML=''; omrResults=[];
  btnRunOMR.disabled = true; btnRun.disabled = true; btnDownloadCSV.disabled = true; btnCSV.disabled = true;
  // enable original run only when runTpl present
  btnRun.disabled = !(runFiles.files.length && runTpl.value.trim().length);
});

/* helper: create canvas from File (image) */
async function fileToCanvas(file){
  const img = new Image();
  img.src = URL.createObjectURL(file);
  await img.decode();
  const c = document.createElement('canvas'); c.width = img.naturalWidth; c.height = img.naturalHeight;
  c.getContext('2d').drawImage(img,0,0);
  URL.revokeObjectURL(img.src);
  return c;
}

/* Load Pages (images only) */
btnLoadPages.addEventListener('click', async ()=>{
  const files = Array.from(runFiles.files || []);
  if(!files.length) return alert('Select image files first.');
  loadedCanvases = []; canvasContainer.innerHTML='';
  for(const f of files){
    const cv = await fileToCanvas(f);
    loadedCanvases.push({name:f.name, pageNum:1, canvas:cv});
    appendCanvasPreview(cv, f.name);
  }
  if(loadedCanvases.length) { btnRunOMR.disabled = false; alert(`${loadedCanvases.length} image(s) loaded.`); }
});

/* append preview (thumb) */
function appendCanvasPreview(cv,label){
  const wrap = document.createElement('div'); wrap.className='card pad';
  const title = document.createElement('div'); title.className='small'; title.textContent = label; title.style.marginBottom='6px';
  const thumb = document.createElement('canvas');
  const scale = Math.min(900, cv.width);
  thumb.width = scale; thumb.height = Math.round(scale * cv.height / cv.width);
  thumb.getContext('2d').drawImage(cv,0,0, thumb.width, thumb.height);
  wrap.appendChild(title); wrap.appendChild(thumb); canvasContainer.appendChild(wrap);
}

/* Helper: get template object for run */
function getTemplateForRun(){
  try{
    if(runTpl.value.trim()) return JSON.parse(runTpl.value);
    if(tplOut.value.trim()) return JSON.parse(tplOut.value);
  }catch(e){
    throw new Error('Template JSON invalid: '+e.message);
  }
  throw new Error('No template JSON provided (paste in Runner or build in Builder).');
}

/* Run OMR for all loaded pages (new flow) */
btnRunOMR.addEventListener('click', async ()=>{
  if(!cvIsReady) return alert('OpenCV not ready.');
  if(!loadedCanvases.length) return alert('Load pages first.');
  let tpl;
  try{ tpl = getTemplateForRun(); }catch(e){ return alert(e.message); }
  omrResults = []; runResults.innerHTML='';

  // iterate each loaded canvas and process
  const thumbCanvases = Array.from(canvasContainer.querySelectorAll('canvas'));
  for(let i=0;i<loadedCanvases.length;i++){
    const p = loadedCanvases[i];
    const thumb = thumbCanvases[i];
    try{
      const qr = detectFourQRByQuadrants(p.canvas, true);
      const {results, marks} = await processPageQRAnchoredWithMarks(p.canvas, tpl, qr);
      omrResults.push({name:p.name, pageNum:p.pageNum, items: results});

      // draw marks on thumb
      const ctx = thumb.getContext('2d');
      drawOmrMarksOnThumb(ctx, thumb, p.canvas, marks);

      // small card in results
      const card = document.createElement('div'); card.className='card pad';
      card.innerHTML = `<strong>${p.name}</strong>`;
      const cthumb = document.createElement('canvas'); cthumb.width = thumb.width; cthumb.height = thumb.height;
      cthumb.getContext('2d').drawImage(thumb,0,0);
      card.appendChild(cthumb);
      runResults.appendChild(card);
    }catch(e){
      // save error info
      omrResults.push({name:p.name, pageNum:p.pageNum, error: e.message});
      // show red text on thumb
      const ctx = thumb.getContext('2d');
      ctx.save(); ctx.fillStyle='rgba(255,80,80,0.9)'; ctx.font='16px ui-sans-serif,monospace';
      ctx.fillText('ERROR: '+e.message, 8, 20); ctx.restore();

      const card = document.createElement('div'); card.className='card pad';
      card.innerHTML = `<strong>${p.name}</strong><div class="small">Error: ${e.message}</div>`;
      runResults.appendChild(card);
    }
  }

  btnDownloadCSV.disabled = !omrResults.length;
  alert('Batch OMR finished.');
});

/* Draw marks on scaled thumb canvas (green/red transparent fill + label) */
function drawOmrMarksOnThumb(ctxThumb, thumbCanvas, originalCanvas, marks){
  const sx = thumbCanvas.width / originalCanvas.width;
  const sy = thumbCanvas.height / originalCanvas.height;
  ctxThumb.save();
  marks.forEach(m=>{
    const cx = m.x * sx, cy = m.y * sy, r = Math.max(1, m.r * (sx+sy)/2 / 2);
    // transparent fill
    ctxThumb.beginPath();
    ctxThumb.arc(cx,cy,r,0,Math.PI*2);
    ctxThumb.fillStyle = m.value ? 'rgba(62,237,151,0.18)' : 'rgba(255,107,107,0.18)';
    ctxThumb.fill();
    ctxThumb.lineWidth = 2;
    ctxThumb.strokeStyle = m.value ? '#3DED97' : '#FF6B6B';
    ctxThumb.stroke();
    ctxThumb.fillStyle = '#e6edf3';
    ctxThumb.font = '12px ui-monospace,monospace';
    ctxThumb.fillText(m.id, cx + r + 4, cy - 4);
  });
  ctxThumb.restore();
}

/* Download CSV for new flow: header row + rows. If error for image, put "ERROR: reason" in second column */
$('#btnDownloadCSV').addEventListener('click', ()=>{
  if(!omrResults.length) return alert('No results');
  // get column order from template if possible
  let idOrder = [];
  try{
    const tpl = getTemplateForRun();
    idOrder = tpl.bubbles.map(b=>b.id);
  }catch{
    // fallback: union of all ids found
    idOrder = Array.from(new Set(omrResults.flatMap(r => (r.items||[]).map(it=>it.id))));
  }
  const header = ['file', ...idOrder];
  const rows = [header];
  for(const r of omrResults){
    if(r.error){
      // place error in second column; rest empty
      const row = Array(header.length).fill('');
      row[0] = r.name;
      row[1] = 'ERROR: ' + r.error;
      rows.push(row);
    }else{
      const map = Object.fromEntries(r.items.map(it=>[it.id, it.value?1:0]));
      const row = [r.name, ...idOrder.map(id => (id in map ? map[id] : ''))];
      rows.push(row);
    }
  }
  const csv = rows.map(a=>a.join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'}); const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='omr_results.csv'; a.click(); URL.revokeObjectURL(url);
});

/* ===== Original single-run flow (kept) ===== */
btnRun.addEventListener('click', async ()=>{
  if(!cvIsReady) return alert('OpenCV not ready.');
  if(!runFiles.files.length) return alert('Select image(s)');
  let tpl;
  try{ tpl = getTemplateForRun(); }catch(e){ return alert(e.message); }
  runResults.innerHTML=''; runOutRows = [['file','page_index','bubble_id','value','score']];
  for (let i=0;i<runFiles.files.length;i++){
    const f = runFiles.files[i];
    try{
      const canvas = await fileToCanvas(f);
      const qr = detectFourQRByQuadrants(canvas,true);
      const {results, marks} = await processPageQRAnchoredWithMarks(canvas, tpl, qr);
      // draw preview
      const card = document.createElement('div'); card.className='card pad';
      card.innerHTML = `<strong>${f.name}</strong>`;
      const thumb = document.createElement('canvas'); const scale = Math.min(900, canvas.width);
      thumb.width = scale; thumb.height = Math.round(scale * canvas.height / canvas.width);
      thumb.getContext('2d').drawImage(canvas,0,0,thumb.width,thumb.height);
      drawOmrMarksOnThumb(thumb.getContext('2d'), thumb, canvas, marks);
      card.appendChild(thumb);
      const tbl = document.createElement('table'); tbl.innerHTML='<thead><tr><th>ID</th><th>Filled?</th><th>Score</th></tr></thead><tbody></tbody>';
      results.forEach(r=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.id}</td><td class="${r.value?'ok':'no'}">${r.value?'YES':'NO'}</td><td>${r.score.toFixed(3)}</td>`;
        tbl.querySelector('tbody').appendChild(tr);
        runOutRows.push([f.name,1,r.id,r.value?1:0,r.score.toFixed(3)]);
      });
      card.appendChild(tbl); runResults.appendChild(card);
    }catch(e){
      const card = document.createElement('div'); card.className='card pad';
      card.innerHTML = `<strong>${f.name}</strong><div class="small">Error: ${e.message}</div>`;
      runResults.appendChild(card);
      // still write an error row to runOutRows — format: file, ERROR: text
      runOutRows.push([f.name, 'ERROR: '+e.message]);
    }
  }
  btnCSV.disabled = false;
});

/* original flow CSV */
let runOutRows = [];
$('#btnCSV').addEventListener('click', ()=>{
  if(!runOutRows.length) return alert('No data');
  const csv = runOutRows.map(r=>r.join(',')).join('\n');

/* ===== Core computer vision functions ===== */

/* detect QR codes in four quadrants: expects textual payload LT/RT/LB/RB */
function detectFourQRByQuadrants(canvas, expectText=true){
  if(!cvIsReady) throw new Error('OpenCV not ready');
  const src = cv.imread(canvas);
  const qr = new cv.QRCodeDetector();
  const map = {};
  const quads = [
    {k:'tl', x0:0, y0:0, x1:src.cols/2, y1:src.rows/2, expect:'LT'},
    {k:'tr', x0:src.cols/2, y0:0, x1:src.cols, y1:src.rows/2, expect:'RT'},
    {k:'lb', x0:0, y0:src.rows/2, x1:src.cols/2, y1:src.rows, expect:'LB'},
    {k:'rb', x0:src.cols/2, y0:src.rows/2, x1:src.cols, y1:src.rows, expect:'RB'}
  ];
  for(const q of quads){
    const roi = src.roi(new cv.Rect(q.x0,q.y0,q.x1-q.x0,q.y1-q.y0));
    const pts = new cv.Mat(), straight = new cv.Mat();
    const decoded = qr.detectAndDecode(roi, pts, straight);
    if(!pts.empty()){
      const a = pts.data32F;
      const xs = [a[0],a[2],a[4],a[6]].map(v=>v+q.x0);
      const ys = [a[1],a[3],a[5],a[7]].map(v=>v+q.y0);
      const cx = (xs[0]+xs[1]+xs[2]+xs[3])/4;
      const cy = (ys[0]+ys[1]+ys[2]+ys[3])/4;
      const d01 = Math.hypot(xs[1]-xs[0], ys[1]-ys[0]);
      const d12 = Math.hypot(xs[2]-xs[1], ys[2]-ys[1]);
      const d23 = Math.hypot(xs[3]-xs[2], ys[3]-ys[2]);
      const d30 = Math.hypot(xs[0]-xs[3], ys[0]-ys[3]);
      const size = (d01+d12+d23+d30)/4;
      const txt = (decoded||'').trim();
      if(expectText && txt !== q.expect){
        roi.delete(); pts.delete(); straight.delete(); src.delete(); qr.delete();
        throw new Error(`Expected QR "${q.expect}" in ${q.k.toUpperCase()} quadrant, got "${txt||'?'}"`);
      }
      map[q.k] = {x:cx, y:cy, size, text:txt};
    }
    roi.delete(); pts.delete(); straight.delete();
  }
  src.delete(); qr.delete();
  if(!(map.tl && map.tr && map.lb && map.rb)) throw new Error('Not all four QRs detected.');
  // normalize keys used elsewhere (lb -> lb, rb -> rb)
  return {tl:map.tl, tr:map.tr, lb:map.lb, rb:map.rb};
}

/* Draw faint warped template underlay (builder) */
function drawTemplateOverlay(templateImage, qr){
  const overlay = templateOverlay;
  const ctx = overlay.getContext('2d');
  ctx.clearRect(0,0,overlay.width,overlay.height);
  const srcPts = cv.matFromArray(4,1,cv.CV_32FC2,[0,0, templateImage.width,0, 0,templateImage.height, templateImage.width,templateImage.height]);
  const dstPts = cv.matFromArray(4,1,cv.CV_32FC2,[ qr.LT.x,qr.LT.y, qr.RT.x,qr.RT.y, qr.LB.x,qr.LB.y, qr.RB.x,qr.RB.y ]);
  const M = cv.getPerspectiveTransform(srcPts,dstPts);
  const srcMat = cv.imread(templateImage);
  const dstMat = new cv.Mat();
  cv.warpPerspective(srcMat, dstMat, M, new cv.Size(overlay.width, overlay.height));
  cv.imshow(overlay, dstMat);
  srcMat.delete(); dstMat.delete(); srcPts.delete(); dstPts.delete(); M.delete();
}

/* Evaluate bubbles and return both results (in template coords) and marks mapped to original image coords */
async function processPageQRAnchoredWithMarks(canvas, tpl, qrDetected){
  const dpi = tpl.dpi;
  const pageW = mm2px(tpl.page.width_mm||210, dpi);
  const pageH = mm2px(tpl.page.height_mm||297, dpi);

  const srcPts = cv.matFromArray(4,1,cv.CV_32FC2,[
    qrDetected.tl.x, qrDetected.tl.y,
    qrDetected.tr.x, qrDetected.tr.y,
    qrDetected.lb.x, qrDetected.lb.y,
    qrDetected.rb.x, qrDetected.rb.y
  ]);

  const tl = tpl.align_marks.tl, tr = tpl.align_marks.tr, bl = tpl.align_marks.bl, br = tpl.align_marks.br;
  const dstPts = cv.matFromArray(4,1,cv.CV_32FC2,[
    mm2px(tl.x_mm,dpi), mm2px(tl.y_mm,dpi),
    mm2px(tr.x_mm,dpi), mm2px(tr.y_mm,dpi),
    mm2px(bl.x_mm,dpi), mm2px(bl.y_mm,dpi),
    mm2px(br.x_mm,dpi), mm2px(br.y_mm,dpi)
  ]);

  const src = cv.imread(canvas);
  const gray = new cv.Mat(); cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
  const H = cv.findHomography(srcPts, dstPts);
  const warped = new cv.Mat();
  cv.warpPerspective(gray, warped, H, new cv.Size(pageW, pageH), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());

  const th = tpl.threshold || {method:'adaptive_mean', blockSize:31, C:10};
  const method = (th.method||'adaptive_mean').toLowerCase().includes('gauss') ? cv.ADAPTIVE_THRESH_GAUSSIAN_C : cv.ADAPTIVE_THRESH_MEAN_C;
  const wbin = new cv.Mat();
  cv.adaptiveThreshold(warped, wbin, 255, method, cv.THRESH_BINARY_INV, ensureOdd(th.blockSize||31), th.C|0);
  const ratioCut = typeof tpl.fill_ratio === 'number' ? tpl.fill_ratio : 0.55;

  const results = []; const marks = [];
  const Hinv = new cv.Mat(); cv.invert(H, Hinv);

  for(const b of tpl.bubbles){
    const cx_t = mm2px(b.x_mm,dpi), cy_t = mm2px(b.y_mm,dpi), rr_t = mm2px(b.r_mm,dpi);
    const rx = Math.max(0, cx_t-rr_t-2), ry = Math.max(0, cy_t-rr_t-2);
    const rw = Math.min(wbin.cols-rx, 2*rr_t+4), rh = Math.min(wbin.rows-ry, 2*rr_t+4);
    const roi = wbin.roi(new cv.Rect(rx,ry,rw,rh));
    const mask = new cv.Mat.zeros(roi.rows, roi.cols, cv.CV_8UC1);
    cv.circle(mask, new cv.Point(Math.round(cx_t-rx), Math.round(cy_t-ry)), Math.max(1, Math.round(rr_t)), new cv.Scalar(255), -1);
    const tmp = new cv.Mat(); cv.bitwise_and(roi, mask, tmp);
    const filled = cv.countNonZero(tmp);
    const area = Math.PI*rr_t*rr_t;
    const score = Math.min(1, filled/area);
    const value = score >= ratioCut;
    results.push({id:b.id, value, score});
    // map center & radius back to original image coords
    const p0 = cv.matFromArray(1,1,cv.CV_32FC2,[cx_t, cy_t]);
    const p1 = cv.matFromArray(1,1,cv.CV_32FC2,[cx_t+rr_t, cy_t]);
    const q0 = new cv.Mat(); const q1 = new cv.Mat();
    cv.perspectiveTransform(p0,q0,Hinv);
    cv.perspectiveTransform(p1,q1,Hinv);
    const x = q0.data32F[0], y = q0.data32F[1];
    const r_s = Math.hypot(q1.data32F[0]-x, q1.data32F[1]-y);
    marks.push({id:b.id, x, y, r: r_s, value});
    roi.delete(); mask.delete(); tmp.delete(); p0.delete(); p1.delete(); q0.delete(); q1.delete();
  }

  src.delete(); gray.delete(); H.delete(); Hinv.delete(); warped.delete(); wbin.delete(); srcPts.delete(); dstPts.delete();
  return {results, marks};
}

/* utility: detectFourQR is used by both flows */

/* ==== file reading helper === */
async function fileToCanvas(file){
  const img = new Image();
  img.src = URL.createObjectURL(file);
  await img.decode();
  const c = document.createElement('canvas'); c.width = img.naturalWidth; c.height = img.naturalHeight;
  c.getContext('2d').drawImage(img,0,0);
  URL.revokeObjectURL(img.src);
  return c;
}
